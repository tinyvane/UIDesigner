name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target' && github.event.action != 'closed') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
       contains(github.event.comment.body, 'I have read the CLA Document and I hereby sign the CLA'))
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/tinyvane/UIDesigner/blob/main/CLA.md'
          branch: 'main'
          allowlist: tinyvane,dependabot[bot],github-actions[bot]
          remote-organization-name: tinyvane
          remote-repository-name: UIDesigner
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you need to sign our [Contributor License Agreement (CLA)](https://github.com/tinyvane/UIDesigner/blob/main/CLA.md).

            To sign, please post the following comment in this PR:

            ```
            I have read the CLA Document and I hereby sign the CLA
            ```

            ---

            感谢你的贡献！在合并此 PR 之前，你需要签署我们的[贡献者许可协议 (CLA)](https://github.com/tinyvane/UIDesigner/blob/main/CLA.md)。

            请在此 PR 中发表以下评论来签署：

            ```
            I have read the CLA Document and I hereby sign the CLA
            ```
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: |
            All contributors have signed the CLA. Thank you! ✅
            所有贡献者已签署 CLA。谢谢！ ✅
